- name: Instalacja i konfiguracja magazynu obiektów MinIO
  hosts: app_servers
  become: yes

  tasks:
    - name: Krok 1 - Pobranie pliku wykonywalnego bezpośrednio z sieci
      get_url:
        url: https://dl.min.io/server/minio/release/linux-amd64/minio
        dest: /usr/local/bin/minio
        mode: '0755'

    - name: Krok 2 - Utworzenie na dysku katalogu na dane (tzw. wiadra/buckety)
      file:
        path: /mnt/data/minio
        state: directory
        mode: '0755'

    - name: Krok 3 - Utworzenie definicji usługi dla systemu Linux (Systemd)
      copy:
        dest: /etc/systemd/system/minio.service
        content: |
          [Unit]
          Description=MinIO Object Storage
          After=network.target

          [Service]
          Environment="MINIO_ROOT_USER=admin"
          Environment="MINIO_ROOT_PASSWORD=Student123!"
          ExecStart=/usr/local/bin/minio server /mnt/data/minio --console-address ":9001"
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Krok 4 - Uruchomienie MinIO w tle i dodanie do autostartu
      systemd:
        name: minio
        state: started
        enabled: yes
        daemon_reload: yes
